name: App Release

# Phase 2 G11 — builds the sadda-app desktop binary on three OS
# matrix runners and uploads the binaries as GitHub Release
# artifacts. Tag scheme is `v*.*.*-app` to avoid colliding with the
# Python wheel release workflow's `v*.*.*` tags.

on:
  push:
    tags:
      - "v*.*.*-app"
  # Manual dispatch builds binaries + uploads as Actions artifacts
  # but does NOT create a GitHub Release (the publish job is gated
  # on the push event).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build sadda-app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: sadda-app
            asset_name: sadda-app-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: sadda-app
            asset_name: sadda-app-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: sadda-app.exe
            asset_name: sadda-app-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin sadda-app --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staged
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
             "staged/${{ matrix.asset_name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_name }}
          path: staged/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on actual tag push — workflow_dispatch is dry-run.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist-staging

      - name: Flatten into dist/
        run: |
          mkdir -p dist
          find dist-staging -type f -exec cp {} dist/ \;
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true

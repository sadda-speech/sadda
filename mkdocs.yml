site_name: sadda
site_description: Open-source toolkit for phonetics and speech-science research.
site_url: https://sadda-speech.github.io/sadda/
repo_url: https://github.com/sadda-speech/sadda
repo_name: sadda-speech/sadda
edit_uri: edit/main/docs/
copyright: Copyright &copy; Daniel Brenner. Dual-licensed under Apache 2.0 OR MIT.

theme:
  name: material
  # Theme overrides (relative to this config file). overrides/main.html appends
  # the rotating open-source thank-you strip below the standard footer.
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    # Light mode (default)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Rotating open-source thank-you strip in the footer. The JS picks one project
# from assets/credits.json per page load; assets/css styles the strip. See the
# 2026-06-30 banner design in BACKLOG / DEVLOG.
extra_css:
  - assets/css/oss-thanks.css
extra_javascript:
  - assets/js/oss-thanks.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Read symbols from the installed `sadda` package (which the
          # docs CI installs via `maturin develop --release`). Falling
          # back to the `.pyi` stubs would lose runtime-only metadata.
          paths: [python]
          # griffe extension: append a repo source link to every API
          # entry, resolved by tools/docs/source_links.py. See the
          # 2026-05-29 source-links DEVLOG entries.
          options:
            extensions:
              - tools/docs/griffe_source_links.py
            # The public API re-exports PyO3 classes from the `_native`
            # extension (`Project = stable(_native.Project)`). Static
            # analysis sees those as attributes, so class methods/getters
            # never render. Forcing runtime inspection — now that each
            # #[pyclass] declares module="sadda._native[.<sub>]" so its
            # __module__ resolves instead of "builtins" — makes griffe
            # see the real classes with their members. See the 2026-05-29
            # "class-member rendering" DEVLOG entry.
            force_inspection: true
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: list
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Keyboard cheatsheet: cheatsheet.md
  - Text-to-speech: tts.md
  - Forced alignment: align.md
  - Annotation project cycle: annotation-cycle.md
  - Round-trip lossiness:
      - TextGrid: lossiness/textgrid.md
      - EAF: lossiness/eaf.md
  - API reference:
      - sadda.corpus: api/corpus.md
      - sadda.dsp: api/dsp.md
      - sadda.clinical: api/clinical.md
      - sadda.refdist: api/refdist.md
      - sadda.ml: api/ml.md
      - sadda.live: api/live.md
      - sadda.recipe: api/recipe.md
      - sadda.tts: api/tts.md
      - sadda.align: api/align.md

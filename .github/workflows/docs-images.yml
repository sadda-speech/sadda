name: Docs images

# S8 — the documentation-image drift check. Renders the real app HEADLESSLY
# (egui_kittest + wgpu on lavapipe, a software Vulkan rasteriser) so a UI change
# that alters a documentation figure can be caught here.
#
# ADVISORY for now (the whole job is `continue-on-error`): headless GPU on CI
# runners is environment-fragile, and pixel-exact rendering isn't guaranteed
# across machines (mesa/lavapipe version, font AA). This job runs the render
# tests and surfaces failures/diffs as logs + artifacts without blocking the PR.
# Once it renders reliably in CI (and the pixel goldens are regenerated FROM CI
# with UPDATE_SNAPSHOTS=1 and confirmed stable), split out the structural
# `Render checks` step and drop its `continue-on-error` to make it a hard gate.
#
# Local equivalents: `just docs-images` (render + check) and
# `just docs-images-update` (refresh goldens after an intended UI change).

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYO3_PYTHON: "/usr/bin/python3"
  # Restrict wgpu to Vulkan so it never touches a real/absent GPU on the runner
  # — with only lavapipe (software) installed, that's the sole adapter. NOTE: do
  # NOT set VK_ICD_FILENAMES to a hard-coded path; it *overrides* the loader's
  # auto-discovery, and the lavapipe ICD filename/location varies by mesa version
  # (Ubuntu 24.04's mesa 25.x isn't at the old lvp_icd.x86_64.json path). Letting
  # the loader scan /usr/share/vulkan/icd.d/ finds whatever was installed.
  WGPU_BACKEND: vulkan

jobs:
  docs-images:
    name: headless doc-image render (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        # libasound2-dev: cpal (live recording) build. mesa-vulkan-drivers +
        # libvulkan1 + vulkan-tools: lavapipe software Vulkan. python3-dev: a
        # shared libpython for pyo3 auto-initialize at runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev mesa-vulkan-drivers libvulkan1 vulkan-tools python3-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Sanity-check the software Vulkan adapter
        # Show what the loader can actually find (diagnostic; never fails the job).
        run: |
          echo "== installed ICDs =="; ls -la /usr/share/vulkan/icd.d/ || true
          echo "== vulkaninfo =="; vulkaninfo --summary 2>&1 | head -40 || true

      - name: Render + snapshot checks
        id: render
        continue-on-error: true
        run: |
          cargo test -p sadda-app --bins doc_render -- \
            --ignored --test-threads=1

      - name: Upload snapshot diffs
        if: steps.render.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: |
            crates/app/tests/snapshots/*.new.png
            crates/app/tests/snapshots/*.diff.png
          if-no-files-found: ignore

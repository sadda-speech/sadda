name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "python/sadda/**"
      - "crates/python/src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# GitHub Pages: a single concurrent deployment per ref.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  PYO3_PYTHON: "/usr/bin/python3"
  # Opt JS actions into Node.js 24 ahead of the 2026-06-02 forced switch
  # (silences the deprecation warning and catches any incompatibility
  # early; covers every JS action without per-pin maintenance).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup show

      - name: Install ALSA dev headers
        # cpal's alsa-sys needs libasound2-dev to link `libasound` on
        # Debian/Ubuntu hosts. Without it, `uv sync` fails inside the
        # maturin build step.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python + project
        # `uv sync` installs deps and builds the sadda wheel into .venv/
        # so mkdocstrings can introspect the live package (not the
        # static .pyi stubs).
        run: uv sync

      - name: Install docs dependencies
        run: uv pip install mkdocs-material 'mkdocstrings[python]'

      - name: Build mkdocs site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
